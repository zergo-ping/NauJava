<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
</head>
<body>
    <h1>Регистрация</h1>
    
    <div th:if="${error}" th:text="${error}">
    </div>
    
    <form method="post" th:action="@{/auth/register}" th:object="${user}">
        <div>
            <label for="fullName">Полное имя:</label>
            <input type="text" id="fullName" th:field="*{fullName}" required>
        </div>
        
        <div>
            <label for="email">Email:</label>
            <input type="email" id="email" th:field="*{email}" required>
        </div>
        
        <div>
            <label for="password">Пароль:</label>
            <input type="password" id="password" th:field="*{password}" required>
        </div>
        
        <div>
            <label for="passwordConfirm">Подтвердите пароль:</label>
            <input type="password" id="passwordConfirm" th:field="*{passwordConfirm}" required>
        </div>
        
        <button type="submit">Зарегистрироваться</button>
    </form>
    
    <p>У вас уже есть учетная запись? <a href="/auth/login">Войдите здесь</a></p>
</body>
</html>
