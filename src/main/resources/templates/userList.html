<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User List</title>
</head>
<body>
    <nav>
        <h1>User List</h1>
        <a href="/logout" style="float: right; margin-right: 20px;">Выход</a>
    </nav>
    <br style="clear: both;">
    <table border="1">
        <tr>
            <th>ID</th>
            <th>Email</th>
        </tr>
        <tr th:each="user : ${users}">
            <td th:text="${user.getId()}"></td>
            <td th:text="${user.getEmail()}"></td>
        </tr>
    </table>
</body>
</html>
